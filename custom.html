<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>USER SPECIMEN · THE TIME ARCHIVE</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Cormorant+Garamond:ital,wght@0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #efdfd0; --ink: #2a1e16;
    --ink-soft: #5a4638; --ink-faint: #86695a;
    --ink-dim: #b89a88; --accent: #a83a2a;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paper); color: var(--ink);
    font-family: var(--mono); font-size: 12.5px; line-height: 1.5;
    min-height: 100vh;
    background-image: radial-gradient(circle at 1px 1px, rgba(60,40,30,0.22) 0.8px, transparent 1.2px);
    background-size: 5px 5px;
    padding: 24px clamp(16px, 4vw, 48px) 80px;
  }
  pre { margin: 0; font-family: var(--mono); white-space: pre; line-height: 1.15; }
  .topbar {
    max-width: 1200px; margin: 0 auto;
    display: flex; justify-content: space-between; align-items: center;
    padding-bottom: 14px; border-bottom: 1px solid var(--ink);
  }
  .btn {
    background: transparent; border: 1px solid var(--ink-soft);
    color: var(--ink); padding: 6px 12px;
    font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.16em;
    cursor: pointer; text-transform: uppercase;
    text-decoration: none; display: inline-block;
  }
  .btn:hover { background: var(--ink); color: var(--paper); }
  .btn.danger { color: #883535; border-color: #883535; }
  .specnum { font-size: 11px; letter-spacing: 0.2em; color: var(--ink-faint); }
  .layout {
    max-width: 1200px; margin: 24px auto 0;
    display: grid; grid-template-columns: 1.1fr 1fr; gap: 24px;
  }
  @media (max-width: 800px) { .layout { grid-template-columns: 1fr; } }
  .panel {
    border: 1px solid var(--ink); position: relative;
    padding: 36px 20px; background: rgba(255,255,255,0.18);
  }
  .panel-title {
    position: absolute; top: -10px; left: 14px;
    background: var(--paper); padding: 0 8px;
    font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.22em;
    color: var(--ink-soft); text-transform: uppercase;
  }
  .clock-area {
    display: flex; align-items: center; justify-content: center;
    min-height: 460px;
    flex-direction: column;
  }
  .print-frame {
    position: relative;
    width: 100%;
    max-width: 420px;
    background: var(--paper);
    border: 1px solid var(--ink-dim);
    overflow: hidden;
  }
  .print-frame canvas {
    display: block;
    width: 100%;
    height: auto;
  }
  .record-caption {
    margin-top: 18px;
    text-align: center;
    font-family: var(--serif);
  }
  .record-caption .day-count {
    font-size: 36px; font-weight: 500;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .record-caption .day-label {
    font-style: italic; font-size: 20px;
    color: var(--ink-soft);
    margin-left: 4px;
  }
  .record-caption .day-since {
    font-family: var(--mono);
    font-size: 10.5px; letter-spacing: 0.22em;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-top: 8px;
  }
  .anchor-caption {
    margin-top: 14px;
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.22em;
    color: var(--ink-faint);
    text-transform: uppercase;
    text-align: center;
  }

  .controls {
    margin-top: 22px; display: flex; gap: 8px;
    justify-content: center; flex-wrap: wrap;
  }
  .scrubber { margin-top: 18px; padding: 0 24px; }
  .scrubber-row {
    display: flex; justify-content: space-between;
    font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.16em;
    color: var(--ink-faint); margin-bottom: 4px; text-transform: uppercase;
  }
  .scrubber input[type=range] { width: 100%; accent-color: var(--accent); }

  .plaque-kind {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em;
    color: var(--accent); margin-bottom: 8px;
  }
  .plaque h2 {
    font-family: var(--serif); font-style: italic;
    font-size: 36px; line-height: 1.1; font-weight: 500;
    margin: 0; color: var(--ink); letter-spacing: -0.01em;
  }
  .rule { color: var(--ink-dim); font-size: 12px; margin: 14px 0; }
  .row {
    display: grid; grid-template-columns: 140px 1fr; gap: 12px;
    padding: 4px 0; align-items: baseline;
    font-family: var(--mono); font-size: 12px;
  }
  .row .k { color: var(--ink-faint); }
  .row .v { color: var(--ink); }
  .row .v.accent { color: var(--accent); }
  .notes {
    font-family: var(--mono); font-size: 12px; line-height: 1.7;
    color: var(--ink-soft);
  }
  .footer {
    margin-top: 16px; display: flex; justify-content: space-between; align-items: center;
  }
  .footer-tag {
    font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.18em;
    color: var(--ink-faint); text-transform: uppercase;
  }
  .missing, .loading {
    text-align: center; padding: 80px 20px;
    color: var(--ink-faint); font-size: 13px;
    letter-spacing: 0.18em; text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="topbar">
    <a href="index.html" class="btn">[ ← BACK TO CABINET ]</a>
    <span class="specnum" id="specnumLabel">USER SPECIMEN</span>
  </div>

  <div id="content">
    <div class="loading">◇ loading specimen...</div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="core.js"></script>
<script>
(async function () {
  const id = new URLSearchParams(location.search).get('id');


  const SPEC = await TA_DB.getSpecimen(id);

  if (!SPEC) {
    document.getElementById('content').innerHTML =
      '<div class="missing">SPECIMEN NOT FOUND IN ARCHIVE.</div>';
    return;
  }


  let kind = SPEC.kind || TA.kindOf(SPEC.type);
  if (kind === 'fixed') kind = 'anchor';
  if (kind === 'accumulate') kind = 'record';

  const isAnchor = kind === 'anchor';
  const canScrub = !isAnchor;

  document.getElementById('specnumLabel').textContent = 'SPECIMEN N° ' + TA.pad4(SPEC.catalog);

  function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, function (c) {
      return ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c];
    });
  }

  const root = document.getElementById('content');
  root.innerHTML = `
    <div class="layout">
      <div class="panel">
        <span class="panel-title">┄ SPECIMEN ┄</span>
        <div class="clock-area" id="clockArea"></div>
        <div class="controls" id="controls"></div>
        <div class="scrubber" id="scrubber" style="display:none;">
          <div class="scrubber-row">
            <span>◁ scrub</span>
            <span id="scrubLabel">● live</span>
          </div>
          <input type="range" id="scrubInput" min="0" step="1000" />
        </div>
      </div>
      <div class="panel plaque">
        <span class="panel-title">┄ PLAQUE ┄</span>
        <div class="plaque-kind">>>> ${kind.toUpperCase()}</div>
        <h2>${escapeHtml(SPEC.title)}</h2>
        <pre class="rule">──────────────────────────────────────────────</pre>
        <div id="plaqueRows"></div>
        <pre class="rule">──────────────────────────────────────────────</pre>
        <div class="notes">${(SPEC.description || '— no annotation recorded —').split('\\n').map(function (l) { return '&gt; ' + escapeHtml(l); }).join('<br/>')}</div>
        <pre class="rule">└──────────────────────────────────────────────┘</pre>
        <div class="footer">
          <span class="footer-tag" id="catTag"></span>
          <button class="btn danger" id="delBtn">[ × REMOVE ]</button>
        </div>
      </div>
    </div>
  `;

 
  const KEY = 'TA_STATE_' + SPEC.id;
  let saved = (function () {
    try { return JSON.parse(localStorage.getItem(KEY) || 'null'); } catch (e) { return null; }
  })() || { startAt: SPEC.startAt || Date.now(), paused: false, pausedElapsed: 0 };
  function saveState() { localStorage.setItem(KEY, JSON.stringify(saved)); }

  const controlsEl = document.getElementById('controls');
  function makeBtn(label, onClick) {
    const b = document.createElement('button');
    b.className = 'btn'; b.textContent = label;
    b.addEventListener('click', onClick);
    controlsEl.appendChild(b);
    return b;
  }

  let pauseBtn = null;
  if (!isAnchor) {
    pauseBtn = makeBtn(saved.paused ? '[ ▶ RESUME ]' : '[ ▮▮ PAUSE ]', function () {
      if (saved.paused) {
        saved.startAt = Date.now() - saved.pausedElapsed;
        saved.paused = false;
      } else {
        saved.pausedElapsed = Date.now() - saved.startAt;
        saved.paused = true;
      }
      saveState();
      pauseBtn.textContent = saved.paused ? '[ ▶ RESUME ]' : '[ ▮▮ PAUSE ]';
      render();
    });
    makeBtn('[ ↻ RESET ]', function () {
      saved.startAt = Date.now();
      saved.paused = false; saved.pausedElapsed = 0;
      saveState();
      pauseBtn.textContent = '[ ▮▮ PAUSE ]';
      render();
    });
  }


  document.getElementById('delBtn').addEventListener('click', async function () {
    if (!confirm('Remove this specimen from the archive?\n\nThis affects ALL visitors — the specimen will be gone for everyone.')) return;
    try {
      await TA_DB.deleteSpecimen(SPEC.id);
      localStorage.removeItem(KEY);
      location.href = 'index.html';
    } catch (err) {
      console.error(err);
      alert('Delete failed — ' + (err.message || 'check console'));
    }
  });


  let scrubVal = null;
  if (canScrub) {
    const sb = document.getElementById('scrubber');
    sb.style.display = 'block';
    const input = document.getElementById('scrubInput');
    const max = kind === 'record'
      ? Math.max((Date.now() - saved.startAt) * 2, 5 * 365 * 86400000)
      : (SPEC.duration || 60000);
    input.max = max;
    input.step = Math.max(1000, max / 1000);
    input.value = 0;
    input.addEventListener('input', function () {
      scrubVal = Number(input.value);
      document.getElementById('scrubLabel').textContent = '○ preview';
      render();
    });
    input.addEventListener('dblclick', function () {
      scrubVal = null;
      document.getElementById('scrubLabel').textContent = '● live';
      render();
    });
  }

  function getElapsed() {
    if (scrubVal != null) return scrubVal;
    if (saved.paused) return saved.pausedElapsed;
    return Math.max(0, Date.now() - saved.startAt);
  }

 
  const clockArea = document.getElementById('clockArea');
  const printFrame = document.createElement('div');
  printFrame.className = 'print-frame';
  const photoCanvas = document.createElement('canvas');
  printFrame.appendChild(photoCanvas);
  clockArea.appendChild(printFrame);

  let dayCountEl = null;
  if (kind === 'record') {
    const cap = document.createElement('div');
    cap.className = 'record-caption';
    cap.innerHTML = '<span class="day-count" id="dayCount">0</span><span class="day-label">days</span>' +
      '<div class="day-since">since ' + new Date(SPEC.startAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }).toLowerCase() + '</div>';
    clockArea.appendChild(cap);
    dayCountEl = cap.querySelector('#dayCount');
  } else if (kind === 'anchor') {
    const cap = document.createElement('div');
    cap.className = 'anchor-caption';
    cap.textContent = '◆ ANCHORED · ' + new Date(SPEC.startAt).toLocaleString('en-US', {
      month: 'long', day: 'numeric', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
    clockArea.appendChild(cap);
  }

  const img = new Image();
  img.crossOrigin = 'anonymous';   
  let imgReady = false;
  img.onload = function () { imgReady = true; render(); };
  img.onerror = function (e) { console.error('image load failed', e); };
  img.src = SPEC.image;

  const SZ = 420;

  function render() {
    if (!imgReady) return;
    const elapsed = getElapsed();

    photoCanvas.style.clipPath = 'none';
    let cellSize = 4;

    if (kind === 'countdown') {
      const progress = Math.min(1, Math.max(0, elapsed / SPEC.duration));
      photoCanvas.style.clipPath = 'inset(0 0 ' + ((1 - progress) * 100) + '% 0)';
    } else if (kind === 'loop') {
      const period = SPEC.duration || 60000;
      const cyclePos = (elapsed % period) / period;
      photoCanvas.style.clipPath = 'inset(0 0 ' + ((1 - cyclePos) * 100) + '% 0)';
    } else if (kind === 'record') {
      const TS = 2 * 365 * 86400000;
      const progress = Math.min(1, Math.max(0, elapsed / TS));
      cellSize = 16 - (16 - 3) * progress;
    }

    TA.drawHalftonePhoto(photoCanvas, img, {
      width: SZ, height: SZ, cellSize: cellSize, color: SPEC.color
    });

    if (dayCountEl) {
      const t = TA.fmtDHMS(elapsed);
      dayCountEl.textContent = t.d;
    }

    renderPlaque(elapsed);
  }

  function renderPlaque(elapsed) {
    const rows = [];
    rows.push(['classification', (TA.labelOf(SPEC.type) || SPEC.type) + ' · ' + kind]);
    if (SPEC.duration && kind !== 'record' && kind !== 'anchor') {
      rows.push(['duration', TA.formatDuration(SPEC.duration)]);
    }
    rows.push([
      kind === 'anchor' ? 'captured' : 'began',
      new Date(SPEC.startAt).toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' })
    ]);
    if (kind === 'record') {
      rows.push(['elapsed', TA.formatDuration(elapsed)]);
    }
    if (kind === 'countdown') {
      const remain = Math.max(0, SPEC.duration - elapsed);
      rows.push(['remaining', TA.formatDuration(remain)]);
    }
    if (kind === 'loop') {
      const period = SPEC.duration || 60000;
      rows.push(['cycle', TA.formatDuration(elapsed % period) + ' / ' + TA.formatDuration(period)]);
    }
    if (!isAnchor) {
      rows.push(['status', saved.paused ? '○ paused' : '● in motion', !saved.paused]);
    }
    let html = '';
    rows.forEach(function (r) {
      html += '<div class="row"><span class="k">' + r[0] + '</span><span class="v' + (r[2] ? ' accent' : '') + '">= ' + r[1] + '</span></div>';
    });
    document.getElementById('plaqueRows').innerHTML = html;
    document.getElementById('catTag').textContent = '◆ CATALOGUED · ' + new Date(SPEC.createdAt || SPEC.startAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  render();
  setInterval(render, isAnchor ? 60000 : 1000);
})();
</script>
</body>
</html>
