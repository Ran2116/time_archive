<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>SPECIMEN N° 0006 · Friends</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Roboto+Slab:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #efdfd0; --ink: #2a1e16;
    --ink-soft: #5a4638; --ink-faint: #86695a;
    --ink-dim: #b89a88; --accent: #a83a2a;
    --serif: 'Roboto Slab', Georgia, serif;
    --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paper); color: var(--ink);
    font-family: var(--mono); font-size: 12.5px; line-height: 1.5;
    min-height: 100vh;
    background-image: radial-gradient(circle at 1px 1px, rgba(60,40,30,0.22) 0.8px, transparent 1.2px);
    background-size: 5px 5px;
    padding: 24px clamp(16px, 4vw, 48px) 80px;
  }
  pre { margin: 0; font-family: var(--mono); white-space: pre; line-height: 1.15; }
  .topbar {
    max-width: 1200px; margin: 0 auto;
    display: flex; justify-content: space-between; align-items: center;
    padding-bottom: 14px; border-bottom: 1px solid var(--ink);
  }
  .btn {
    background: transparent; border: 1px solid var(--ink-soft);
    color: var(--ink); padding: 6px 12px;
    font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.16em;
    cursor: pointer; text-transform: uppercase; text-decoration: none;
    display: inline-block;
  }
  .btn:hover { background: var(--ink); color: var(--paper); }
  .specnum { font-size: 11px; letter-spacing: 0.2em; color: var(--ink-faint); }
  .layout {
    max-width: 1200px; margin: 24px auto 0;
    display: grid; grid-template-columns: 1.1fr 1fr; gap: 24px;
  }
  @media (max-width: 800px) { .layout { grid-template-columns: 1fr; } }
  .panel {
    border: 1px solid var(--ink); position: relative;
    padding: 36px 20px; background: rgba(255,255,255,0.18);
  }
  .panel-title {
    position: absolute; top: -10px; left: 14px;
    background: var(--paper); padding: 0 8px;
    font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.22em;
    color: var(--ink-soft); text-transform: uppercase;
  }
  .clock-area {
    display: flex; align-items: center; justify-content: center;
    min-height: 460px;
    flex-direction: column;
  }
  .clock-area canvas { display: block; }

  /* === halftone photo 容器 === */
  .print-frame {
    position: relative;
    width: 100%;
    max-width: 480px;
    background: var(--paper);
    border: 1px solid var(--ink-dim);
    overflow: hidden;
  }
  .print-frame .halftone-canvas {
    display: block;
    width: 100%;
    height: auto;
  }

  /* 照片底下的"档案签"小字 */
  .anchor-caption {
    margin-top: 14px;
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.22em;
    color: var(--ink-faint);
    text-transform: uppercase;
    text-align: center;
  }

  .controls { margin-top: 22px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .scrubber { margin-top: 18px; padding: 0 24px; }
  .scrubber-row {
    display: flex; justify-content: space-between;
    font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.16em;
    color: var(--ink-faint); margin-bottom: 4px; text-transform: uppercase;
  }
  .scrubber input[type=range] { width: 100%; accent-color: var(--accent); }
  .plaque-kind {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em;
    color: var(--accent); margin-bottom: 8px;
  }
  .plaque h2 {
    font-family: var(--serif); font-style: italic;
    font-size: 36px; line-height: 1.1; font-weight: 500;
    margin: 0; color: var(--ink); letter-spacing: -0.01em;
  }
  .rule { color: var(--ink-dim); font-size: 12px; margin: 14px 0; }
  .row {
    display: grid; grid-template-columns: 140px 1fr; gap: 12px;
    padding: 4px 0; align-items: baseline;
    font-family: var(--mono); font-size: 12px;
  }
  .row .k { color: var(--ink-faint); }
  .row .v { color: var(--ink); }
  .row .v.accent { color: var(--accent); }
  .notes { font-family: var(--mono); font-size: 12px; line-height: 1.7; color: var(--ink-soft); }
  .footer { margin-top: 16px; display: flex; justify-content: space-between; align-items: center; }
  .footer-tag { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.18em; color: var(--ink-faint); text-transform: uppercase; }
</style>
</head>
<body>
  <div class="topbar">
    <a href="index.html" class="btn">[ ← BACK TO CABINET ]</a>
    <span class="specnum">SPECIMEN N° 0006</span>
  </div>

  <div class="layout">
    <div class="panel">
      <span class="panel-title">┄ SPECIMEN ┄</span>
      <div class="clock-area" id="clockArea"></div>
    </div>

    <div class="panel plaque">
      <span class="panel-title">┄ PLAQUE ┄</span>
      <div class="plaque-kind">&gt;&gt;&gt; ANCHOR</div>
      <h2>Friends</h2>
      <pre class="rule">──────────────────────────────────────────────</pre>
      <div id="plaqueRows"></div>
      <pre class="rule">──────────────────────────────────────────────</pre>
      <div class="notes">Travel with friends</div>
      <pre class="rule">└──────────────────────────────────────────────┘</pre>
      <div class="footer">
        <span class="footer-tag" id="catTag"></span>
      </div>
    </div>
  </div>

<script src="core.js"></script>
<script>
(function () {
  // === 锚定时刻:2026 年 4 月 18 日 下午 3:47(本地时间)===
  // new Date(年, 月-1, 日, 小时, 分, 秒)—— 月份从 0 开始,所以 4 月 = 3
  const ANCHOR_AT = new Date(2026, 3, 18, 15, 47, 0).getTime();

  const SPEC = {
    id: "friends",
    file: "first-pho.html",
    catalog: 6,
    type: "fixed",
    kind: "anchor",
    title: "Friends",
    color: "#82295a",
    startAt: ANCHOR_AT,
    image: "friends.png",          // ← 把你的照片命名为 friends.jpg 放在同目录
    description: "Travel with Friends"
  };

  // === 占位图(图片加载失败时显示)===
  function makePlaceholderImage() {
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
      <rect width="400" height="400" fill="#efdfd0"/>
      <circle cx="200" cy="170" r="50" fill="#9a8a7a"/>
      <ellipse cx="200" cy="290" rx="90" ry="50" fill="#9a8a7a"/>
      <text x="200" y="380" font-family="serif" font-size="20" fill="#5a4638" text-anchor="middle" font-style="italic">specimen placeholder</text>
    </svg>`;
    return 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
  }

  // === 渲染 halftone 照片 ===
  const clockArea = document.getElementById('clockArea');
  const printFrame = document.createElement('div');
  printFrame.className = 'print-frame';
  const halftoneCanvas = document.createElement('canvas');
  halftoneCanvas.className = 'halftone-canvas';
  printFrame.appendChild(halftoneCanvas);
  clockArea.appendChild(printFrame);

  // 照片底下的小字签
  const caption = document.createElement('div');
  caption.className = 'anchor-caption';
  caption.textContent = '◆ ANCHORED · ' + new Date(ANCHOR_AT).toLocaleString('en-US', {
    month: 'long', day: 'numeric', year: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
  clockArea.appendChild(caption);

  const img = new Image();
  img.onload = function () {
    const W = 480, H = 480;
    halftoneCanvas.width = W;
    halftoneCanvas.height = H;
    if (window.TA && typeof TA.drawHalftonePhoto === 'function') {
      TA.drawHalftonePhoto(halftoneCanvas, img, {
        width: W, height: H, cellSize: 4, color: SPEC.color
      });
    } else {
      // 降级:直接画图
      const ctx = halftoneCanvas.getContext('2d');
      ctx.fillStyle = '#efdfd0';
      ctx.fillRect(0, 0, W, H);
      ctx.drawImage(img, 0, 0, W, H);
    }
  };
  img.onerror = function () {
    img.onerror = null;
    img.src = makePlaceholderImage();
  };
  img.src = SPEC.image;

  // === Plaque ===
  function renderPlaque() {
    const rows = [];
    rows.push(['classification', 'fixed moment · ' + SPEC.kind]);
    rows.push(['captured', new Date(ANCHOR_AT).toLocaleString('en-US', {
      month: 'short', day: 'numeric', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    })]);
    let html = '';
    rows.forEach(function (r) {
      html += '<div class="row"><span class="k">' + r[0] + '</span><span class="v">= ' + r[1] + '</span></div>';
    });
    document.getElementById('plaqueRows').innerHTML = html;
    document.getElementById('catTag').textContent = '◆ CATALOGUED · ' +
      new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  renderPlaque();
})();
</script>
</body>
</html>
